# Workshops I've held or helped with.
#
# Schema (per entry):
#   title:       Workshop title
#   venue:       Venue / conference name WITHOUT year (e.g. "useR!", not "useR! 2024")
#                — the year/month is appended automatically from the fields below
#   year:        Required for single-occurrence workshops, 4-digit
#   month:       Optional integer 1-12 — enables month-precision sort/display
#   years:       Optional list for recurring workshops (e.g. [2021, 2023, 2025])
#                — used instead of year/month; sorts by max year; displays as
#                "2021, 2023, 2025"; pair with a single `materials` link to
#                the current iteration
#   url:         Link to the workshop / event page
#   people:      Ordered list of co-organizers/instructors as displayed
#                (do NOT include yourself — the page is yours)
#   materials:   Optional URL — slides, GitHub repo, recording, etc.
#   description: Optional one-liner of context


